name: End-to-End User Service Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  # ─── JOB 1: Windows Runner (Phases 1-4) ──────────────────────────────
  pipeline:
    runs-on: [self-hosted, windows-runner]

    env:
      MAVEN_BIN: 'C:\maven\apache-maven-3.9.12\59fe215c0ad6947fea90184bf7add084544567b927287592651fda3782e0e798\bin\mvn.cmd'
      SETTINGS_XML: 'C:\maven\settings.xml'
      JAVA_HOME: 'C:\Program Files\Java\jdk-17'
      SONAR_TOKEN: 'sqa_b77a0c65feff9e8f0bcd782da843b9dfe8d7c640'
      IMAGE_NAME: 'springboot-user-service'
      CONTAINER_NAME: 'springboot-user-service'
      HTTP_PROXY: 'http://192.168.9.112:808'
      HTTPS_PROXY: 'http://192.168.9.112:808'
      NO_PROXY: '192.168.8.25,localhost,127.0.0.1'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: false

      # ─── PHASE 1: Quality Gate ───────────────────────────────────────
      - name: SonarQube Analysis
        run: |
          Write-Host "=== PHASE 1: SonarQube Analysis ==="
          & "${{ env.MAVEN_BIN }}" -s "${{ env.SETTINGS_XML }}" clean verify sonar:sonar "-Dsonar.login=${{ env.SONAR_TOKEN }}" "-Dsonar.host.url=http://localhost:9000" "-Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml" "-U"
          if ($LASTEXITCODE -ne 0) { Write-Host "ERROR: SonarQube failed!"; exit 1 }
          Write-Host "SonarQube analysis complete."

      # ─── PHASE 2: Artifact Storage ───────────────────────────────────
      - name: Upload to Nexus
        run: |
          Write-Host "=== PHASE 2: Uploading artifact to Nexus ==="
          & "${{ env.MAVEN_BIN }}" -s "${{ env.SETTINGS_XML }}" deploy -DskipTests -U
          if ($LASTEXITCODE -ne 0) { Write-Host "ERROR: Nexus deploy failed!"; exit 1 }
          Write-Host "Nexus upload complete."

      # ─── PHASE 3: Build WAR + Docker Image ───────────────────────────
      - name: Build WAR and Docker Image
        run: |
          Write-Host "=== PHASE 3: Building WAR ==="
          & "${{ env.MAVEN_BIN }}" -s "${{ env.SETTINGS_XML }}" clean package -DskipTests
          if ($LASTEXITCODE -ne 0) { Write-Host "ERROR: Maven build failed!"; exit 1 }

          Write-Host "=== Checking target folder ==="
          Get-ChildItem "${{ github.workspace }}\target" | Where-Object { $_.Name -like "*.war" }

          Write-Host "=== Copying demo.war to app.war ==="
          if (Test-Path "${{ github.workspace }}\target\demo.war") {
            Copy-Item "${{ github.workspace }}\target\demo.war" -Destination "${{ github.workspace }}\app.war" -Force
            Write-Host "SUCCESS: app.war copied!"
          } else {
            Write-Host "ERROR: demo.war not found in target!"
            exit 1
          }

          Write-Host "=== Verifying app.war ==="
          Get-ChildItem "${{ github.workspace }}\app.war"

          Write-Host "=== Building Docker image ==="
          cmd /c "docker build -t ${{ env.IMAGE_NAME }} ${{ github.workspace }}"
          if ($LASTEXITCODE -ne 0) { Write-Host "ERROR: Docker build failed!"; exit 1 }
          Write-Host "Docker image built successfully!"

      # ─── PHASE 4: Deploy Container ───────────────────────────────────
      - name: Deploy Container
        run: |
          Write-Host "=== PHASE 4: Deploying Container ==="

          Write-Host "--- Checking docker availability ---"
          $dockerPath = (Get-Command docker -ErrorAction SilentlyContinue).Source
          if (-not $dockerPath) {
            Write-Host "ERROR: docker not found in PATH!"
            Write-Host "PATH = $env:PATH"
            exit 1
          }
          Write-Host "Docker found at: $dockerPath"
          cmd /c "docker --version"

          Write-Host "--- Stopping and removing old containers ---"
          cmd /c "docker stop ${{ env.CONTAINER_NAME }}"
          cmd /c "docker rm ${{ env.CONTAINER_NAME }}"
          cmd /c "docker stop user-service"
          cmd /c "docker rm user-service"

          Write-Host "--- Starting new container ---"
          cmd /c "docker run -d --name ${{ env.CONTAINER_NAME }} -p 9090:8090 --restart unless-stopped ${{ env.IMAGE_NAME }}"

          if ($LASTEXITCODE -ne 0) {
            Write-Host "ERROR: docker run failed! Exit code: $LASTEXITCODE"
            cmd /c "docker logs ${{ env.CONTAINER_NAME }}"
            exit 1
          }

          Write-Host "Container started. Waiting 25 seconds for Spring Boot..."
          Start-Sleep -Seconds 25

          Write-Host "--- Running containers ---"
          cmd /c "docker ps"

          Write-Host "--- Container logs ---"
          cmd /c "docker logs ${{ env.CONTAINER_NAME }}"

          Write-Host "======================================"
          Write-Host " App live at: http://localhost:9090/demo/users"
          Write-Host "======================================"

  # ─── JOB 2: Ubuntu Runner (Phases 5-6) ───────────────────────────────
  ansible-deploy:
    runs-on: [self-hosted, ubuntu-runner]
    needs: pipeline

    steps:
      # ─── PHASE 5: Fresh Redis Setup ───────────────────────────────────
      - name: Setup Fresh Redis
        run: |
          echo "=== PHASE 5: Setting up Fresh Redis ==="

          echo "--- Stop Redis if running ---"
          docker stop redis-cache || true

          echo "--- Remove old Redis container ---"
          docker rm redis-cache || true

          echo "--- Remove old app-network ---"
          docker network rm app-network || true

          echo "--- Create fresh app-network ---"
          docker network create app-network

          echo "--- Start fresh Redis container ---"
          docker run -d \
            --name redis-cache \
            --network app-network \
            -p 6379:6379 \
            --restart unless-stopped \
            redis:alpine

          echo "--- Wait for Redis to be ready ---"
          sleep 3

          echo "--- Verify Redis is running ---"
          docker exec redis-cache redis-cli ping

          echo "======================================"
          echo " Redis is FRESH and READY!"
          echo "======================================"

      # ─── PHASE 6: Deploy via Ansible ──────────────────────────────────
      - name: Deploy via Ansible
        run: |
          echo "=== PHASE 6: Deploying via Ansible ==="
          export PATH=$PATH:/home/anchit/.local/bin
          ansible-playbook \
            -i /home/anchit/github-actions-ansible/inventory.yml \
            /home/anchit/github-actions-ansible/deploy-playbook.yml
          if [ $? -ne 0 ]; then
            echo "ERROR: Ansible deploy failed!"
            exit 1
          fi
          echo "======================================"
          echo " App live at: http://localhost:9090/demo/users"
          echo "======================================"