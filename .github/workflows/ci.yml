name: End-to-End User Service Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  pipeline:
    runs-on: self-hosted

    env:
      MAVEN_BIN: 'C:\maven\apache-maven-3.9.12\59fe215c0ad6947fea90184bf7add084544567b927287592651fda3782e0e798\bin\mvn.cmd'
      SETTINGS_XML: 'C:\maven\settings.xml'
      JAVA_HOME: 'C:\Program Files\Java\jdk-17'
      SONAR_TOKEN: 'sqa_b77a0c65feff9e8f0bcd782da843b9dfe8d7c640'
      IMAGE_NAME: 'springboot-user-service'
      HTTP_PROXY: 'http://192.168.9.112:808'
      HTTPS_PROXY: 'http://192.168.9.112:808'
      NO_PROXY: '192.168.8.25,localhost,127.0.0.1'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: false

      # PHASE 1: Quality Gate
      - name: SonarQube Analysis
        run: |
          & "${{ env.MAVEN_BIN }}" -s "${{ env.SETTINGS_XML }}" clean verify sonar:sonar `
          "-Dsonar.login=${{ env.SONAR_TOKEN }}" `
          "-Dsonar.host.url=http://localhost:9000" `
          "-Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml" `
          "-U"

      # PHASE 2: Artifact Storage
      - name: Upload to Nexus
        run: |
          & "${{ env.MAVEN_BIN }}" -s "${{ env.SETTINGS_XML }}" deploy -DskipTests -U

      # PHASE 3: Containerization — Download WAR + Build in one step ok
      - name: Download WAR and Docker Build
        run: |
          Invoke-WebRequest `
            -Uri "http://192.168.8.25:8081/repository/maven-releases/com/heg/Docker-User-Service-Docker/1.0.8/Docker-User-Service-Docker-1.0.8.war" `
            -OutFile "${{ github.workspace }}\app.war" `
            -Proxy $null

          docker build -t springboot-user-service "${{ github.workspace }}"