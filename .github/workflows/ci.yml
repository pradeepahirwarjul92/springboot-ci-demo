name: CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Get Code
      uses: actions/checkout@v4   # ✅ updated

    - name: Setup Java
      uses: actions/setup-java@v4   # ✅ updated
      with:
        distribution: 'temurin'     # ✅ required
        java-version: '17'

    - name: Build Project
      run: mvn clean install -DskipTests