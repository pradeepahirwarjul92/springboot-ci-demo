name: Native CI-CD to Nexus

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: self-hosted
    
    env:
      # Focus on connectivity: Using the new stable location
      MAVEN_BIN: 'C:\maven\apache-maven-3.9.12\59fe215c0ad6947fea90184bf7add084544567b927287592651fda3782e0e798\bin\mvn.cmd'
      SETTINGS_XML: 'C:\maven\settings.xml'
      HTTP_PROXY: 'http://192.168.9.112:808'
      HTTPS_PROXY: 'http://192.168.9.112:808'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build with Maven
        # This uses the Call Operator (&) to run the global Maven command
        run: |
          & "${{ env.MAVEN_BIN }}" -s "${{ env.SETTINGS_XML }}" clean package -DskipTests

      - name: Deploy to Native Nexus
        # This pushes the artifact to localhost:8081 as per your diagram
        run: |
          & "${{ env.MAVEN_BIN }}" -s "${{ env.SETTINGS_XML }}" deploy -DskipTests