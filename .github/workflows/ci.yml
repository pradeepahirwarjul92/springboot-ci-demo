name: End-to-End User Service Pipeline


on:
  push:
    branches: [ "main" ]


jobs:
  # ─── JOB 1: Windows Runner (Phases 1-4) ─────────────────────────────
  pipeline:
    runs-on: [self-hosted, windows-runner]


    env:
      MAVEN_BIN: 'C:\maven\apache-maven-3.9.12\59fe215c0ad6947fea90184bf7add084544567b927287592651fda3782e0e798\bin\mvn.cmd'
      SETTINGS_XML: 'C:\maven\settings.xml'
      JAVA_HOME: 'C:\Program Files\Java\jdk-17'
      SONAR_TOKEN: 'sqa_b77a0c65feff9e8f0bcd782da843b9dfe8d7c640'
      IMAGE_NAME: 'springboot-user-service'
      CONTAINER_NAME: 'springboot-user-service'
      HTTP_PROXY: 'http://192.168.9.112:808'
      HTTPS_PROXY: 'http://192.168.9.112:808'
      NO_PROXY: '192.168.8.25,localhost,127.0.0.1'


    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: false


      # ─── PHASE 1: Quality Gate ───────────────────────────────────────
      - name: SonarQube Analysis
        run: |
          Write-Host "=== PHASE 1: SonarQube Analysis ==="
          & "${{ env.MAVEN_BIN }}" -s "${{ env.SETTINGS_XML }}" clean verify sonar:sonar `
            "-Dsonar.login=${{ env.SONAR_TOKEN }}" `
            "-Dsonar.host.url=http://localhost:9000" `
            "-Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml" `
            "-Dsonar.qualitygate.wait=true" `
            "-U"
          if ($LASTEXITCODE -ne 0) { Write-Host "ERROR: SonarQube Quality Gate FAILED!"; exit 1 }
          Write-Host "SonarQube Quality Gate PASSED!"


      # ─── PHASE 2: Artifact Storage ───────────────────────────────────
      - name: Upload to Nexus
        run: |
          Write-Host "=== PHASE 2: Uploading artifact to Nexus ==="
          & "${{ env.MAVEN_BIN }}" -s "${{ env.SETTINGS_XML }}" deploy -DskipTests -U
          if ($LASTEXITCODE -ne 0) { Write-Host "ERROR: Nexus deploy failed!"; exit 1 }
          Write-Host "Nexus upload complete."


      # ─── PHASE 3: Build WAR + Docker Image ───────────────────────────
      - name: Build WAR and Docker Image
        run: |
          Write-Host "=== PHASE 3: Building WAR ==="
          & "${{ env.MAVEN_BIN }}" -s "${{ env.SETTINGS_XML }}" clean package -DskipTests
          if ($LASTEXITCODE -ne 0) { Write-Host "ERROR: Maven build failed!"; exit 1 }


          Write-Host "=== Checking target folder ==="
          Get-ChildItem "${{ github.workspace }}\target" | Where-Object { $_.Name -like "*.war" }


          Write-Host "=== Copying demo.war to app.war ==="
          if (Test-Path "${{ github.workspace }}\target\demo.war") {
            Copy-Item "${{ github.workspace }}\target\demo.war" -Destination "${{ github.workspace }}\app.war" -Force
            Write-Host "SUCCESS: app.war copied!"
          } else {
            Write-Host "ERROR: demo.war not found in target!"
            exit 1
          }


          Write-Host "=== Verifying app.war ==="
          Get-ChildItem "${{ github.workspace }}\app.war"


          Write-Host "=== Building Docker image ==="
          cmd /c "docker build -t ${{ env.IMAGE_NAME }} ${{ github.workspace }}"
          if ($LASTEXITCODE -ne 0) { Write-Host "ERROR: Docker build failed!"; exit 1 }
          Write-Host "Docker image built successfully!"


      # ─── PHASE 4: Deploy Container ───────────────────────────────────
      - name: Deploy Container
        run: |
          Write-Host "=== PHASE 4: Deploying Container ==="


          Write-Host "--- Checking docker availability ---"
          $dockerPath = (Get-Command docker -ErrorAction SilentlyContinue).Source
          if (-not $dockerPath) {
            Write-Host "ERROR: docker not found in PATH!"
            Write-Host "PATH = $env:PATH"
            exit 1
          }
          Write-Host "Docker found at: $dockerPath"
          cmd /c "docker --version"


          Write-Host "--- Stopping and removing old containers ---"
          cmd /c "docker stop ${{ env.CONTAINER_NAME }}"
          cmd /c "docker rm ${{ env.CONTAINER_NAME }}"
          cmd /c "docker stop user-service"
          cmd /c "docker rm user-service"


          Write-Host "--- Starting new container ---"
          cmd /c "docker run -d --name ${{ env.CONTAINER_NAME }} -p 9090:8090 --restart unless-stopped ${{ env.IMAGE_NAME }}"


          if ($LASTEXITCODE -ne 0) {
            Write-Host "ERROR: docker run failed! Exit code: $LASTEXITCODE"
            cmd /c "docker logs ${{ env.CONTAINER_NAME }}"
            exit 1
          }


          Write-Host "Container started. Waiting 25 seconds for Spring Boot..."
          Start-Sleep -Seconds 25


          Write-Host "--- Running containers ---"
          cmd /c "docker ps"


          Write-Host "--- Container logs ---"
          cmd /c "docker logs ${{ env.CONTAINER_NAME }}"


          Write-Host "======================================"
          Write-Host " App live at: http://localhost:9090/demo/users"
          Write-Host "======================================"


  # ─── JOB 2: Ubuntu Runner (Phases 5-7) ───────────────────────────────
  ansible-deploy:
    runs-on: [self-hosted, ubuntu-runner]
    needs: pipeline


    steps:
      # ─── CHECKOUT (needed for logstash.conf) ──────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4


      # ─── PHASE 5: Setup Infrastructure ────────────────────────────────
            - name: Setup Infrastructure
        run: |
          echo "=== PHASE 5: Setting up Infrastructure ==="

          echo "======================================"
          echo " STEP 1: Cleaning up only Logstash & Redis"
          echo "======================================"

          echo "--- Stop and remove Logstash ---"
          docker stop logstash || true
          docker rm logstash || true

          echo "--- Stop and remove Redis ---"
          docker stop redis-cache || true
          docker rm redis-cache || true

          echo "======================================"
          echo " STEP 2: Ensure app-network exists"
          echo "======================================"

          docker network inspect app-network > /dev/null 2>&1 || docker network create app-network
          echo "app-network ready ✅"

          echo "======================================"
          echo " STEP 3: Starting Redis (Fresh)"
          echo "======================================"

          docker run -d \
            --name redis-cache \
            --network app-network \
            -p 6379:6379 \
            --restart unless-stopped \
            redis:alpine

          sleep 3
          docker exec redis-cache redis-cli ping
          echo "Redis is FRESH and READY! ✅"

          echo "======================================"
          echo " STEP 4: Elasticsearch - Start if not running"
          echo "======================================"

          if [ "$(docker ps -q -f name=elasticsearch)" ]; then
            echo "Elasticsearch already running ✅ - skipping"
            docker network connect app-network elasticsearch || true
          else
            echo "Starting Elasticsearch..."
            docker rm elasticsearch || true
            docker run -d \
              --name elasticsearch \
              --network app-network \
              -p 9200:9200 \
              -p 9300:9300 \
              -e "discovery.type=single-node" \
              -e "ES_JAVA_OPTS=-Xms512m -Xmx512m" \
              --restart unless-stopped \
              elasticsearch:7.17.10
            echo "--- Wait 30 seconds for Elasticsearch to boot ---"
            sleep 30
          fi

          curl -s http://localhost:9200/_cluster/health | grep "cluster_name" && \
            echo "Elasticsearch is READY! ✅" || \
            echo "WARNING: Elasticsearch not responding yet"

          echo "======================================"
          echo " STEP 5: Kibana - Start if not running"
          echo "======================================"

          if [ "$(docker ps -q -f name=kibana)" ]; then
            echo "Kibana already running ✅ - skipping (your dashboards are safe!)"
            docker network connect app-network kibana || true
          else
            echo "Starting Kibana..."
            docker rm kibana || true
            docker run -d \
              --name kibana \
              --network app-network \
              -p 5601:5601 \
              -e "ELASTICSEARCH_HOSTS=http://elasticsearch:9200" \
              --restart unless-stopped \
              kibana:7.17.10
            echo "--- Wait 30 seconds for Kibana to boot ---"
            sleep 30
          fi

          curl -s http://localhost:5601/api/status | grep -o '"level":"[^"]*"' | head -1 && \
            echo "Kibana is READY! ✅" || \
            echo "WARNING: Kibana still booting..."

          echo "======================================"
          echo " STEP 6: Starting Logstash (Fresh)"
          echo "======================================"

          mkdir -p /tmp/logstash-pipeline
          cp $GITHUB_WORKSPACE/logstash.conf /tmp/logstash-pipeline/logstash.conf

          docker run -d \
            --name logstash \
            --network app-network \
            -p 5045:5045 \
            -v /tmp/logstash-pipeline/logstash.conf:/usr/share/logstash/pipeline/logstash.conf \
            --restart unless-stopped \
            logstash:7.17.10

          echo "--- Wait 40 seconds for Logstash to boot ---"
          sleep 40

          docker logs logstash --tail 5 || true
          echo "Logstash is READY! ✅"

          echo "======================================"
          echo " All Infrastructure READY!"
          echo " Redis         → localhost:6379 ✅"
          echo " Elasticsearch → localhost:9200 ✅"
          echo " Kibana        → localhost:5601 ✅ (dashboards preserved!)"
          echo " Logstash      → localhost:5045 ✅"
          echo "======================================"